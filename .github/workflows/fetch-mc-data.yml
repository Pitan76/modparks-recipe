name: Fetch Minecraft Data

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight UTC

jobs:
  update-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 1. Download client.jar and mirror recipe/tag JSON + flat item/block
      #    textures into R2 (preserving their in-jar paths).
      - name: Fetch data and upload to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || 'mp-recipe-images' }}
        run: npm run fetch-mc-data

      # 2. Render isometric 3D block PNGs from the downloaded client.jar.
      - name: Render 3D block PNGs
        run: npx tsx src/scripts/render-blocks.ts

      # 3. Upload rendered PNGs to R2 via wrangler.
      - name: Upload rendered PNGs to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: bash src/scripts/upload-pngs-wrangler.sh
