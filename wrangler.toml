name = "mp-recipe"
main = "src/index.ts"
compatibility_date = "2024-09-09"
compatibility_flags = ["nodejs_compat"]

[define]
"process.env.NODE_ENV" = '"production"'
"process.env.SATORI_STANDALONE" = '"0"'
"process.env.JEST_WORKER_ID" = '"undefined"'

# Serve static assets from the public folder
[site]
bucket = "./public"

# Database for Recipes
[[d1_databases]]
binding = "DB"
database_name = "mp-recipe-db"
database_id = "0fb1922c-7c51-40f1-b4df-9353ce0cfa1f"
migrations_dir = "migrations"

# Storage for Recipe Images
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "mp-recipe-images"
# `wrangler dev --remote` (npm run dev:remote) points at the production bucket on
# purpose, so local debugging sees the real uploaded assets. Writes from local dev
# therefore hit production too — read-only inspection only.
preview_bucket_name = "mp-recipe-images"
