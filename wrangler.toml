name = "mp-recipe"
main = "src/index.ts"
compatibility_date = "2024-09-09"

# Serve static assets from the public folder
[site]
bucket = "./public"

# Database for Recipes
[[d1_databases]]
binding = "DB"
database_name = "mp-recipe-db"
database_id = "your-database-id" # 後で本番用のIDに置き換えます
migrations_dir = "migrations"

# Storage for Recipe Images
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "mp-recipe-images"
